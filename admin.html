<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body>

    <div class="auth-wrapper">

        <div class="background-shape"></div>
        <div class="secondary-shape"></div>

        <!-- Admin Login Form -->
        <div class="credentials-panel signin">
            <h2 class="slide-element">Admin Login</h2>

            <form>
                <div class="field-wrapper slide-element">
                    <input type="text" required>
                    <label>Admin Username</label>
                    <i class="fa-solid fa-user-shield"></i>
                </div>

                <div class="field-wrapper slide-element">
                    <input type="password" required>
                    <label>Password</label>
                    <i class="fa-solid fa-lock"></i>
                </div>

                <div class="field-wrapper slide-element">
                    <button class="submit-button" type="submit">
                        Login
                    </button>
                </div>

                <div class="switch-link slide-element">
                    <p>
                        <a href="index.html">← Back to User Login</a>
                    </p>
                </div>
            </form>
        </div>

        <!-- Right Side Welcome Text -->
        <div class="welcome-section signin">
            <h2 class="slide-element">
                ADMIN<br>ACCESS
            </h2>
        </div>

    </div>

</body>
</html>
